<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mabi Tarô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<!-- HERO -->
<section class="hero">
  <h1>Mabi</h1>
  <p>Pergunte sobre qualquer coisa</p>
  <button onclick="rolar()">Fazer pergunta</button>
</section>

<!-- SOBRE -->
<section class="sobre">
  <h2>Como funciona</h2>
  <p>
    Faça sua pergunta e receba uma leitura de tarô simples e direta.
    Sem julgamentos. Apenas respostas.
  </p>
</section>

<!-- CARTA -->
<section class="carta-area" id="tiragem">
  <h2>Toque para revelar sua carta</h2>

  <div class="card" onclick="tirarCarta()">
    <img id="imgCarta" src="" alt="">
    <p id="textoCarta">Clique na carta</p>
  </div>
</section>

<!-- PERGUNTA -->
<section class="pergunta">
  <h2>Sua pergunta</h2>
  <textarea id="inputPergunta" placeholder="Digite sua pergunta..."></textarea>
  <button onclick="enviar()">Enviar pergunta</button>
</section>

<footer>
  <p>@by.mabbi</p>
</footer>

<script src="script.js"></script>
</body>
</html>
